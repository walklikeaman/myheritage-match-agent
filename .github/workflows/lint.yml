name: Lint

on:
  push:
    paths: ["**/*.py"]
  pull_request:
    paths: ["**/*.py"]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --exclude=venv
